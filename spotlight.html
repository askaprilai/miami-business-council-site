<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Spotlight Submission | Miami Business Council</title>
  <meta name="description" content="Share your story to be featured in the Miami Business Council Member Spotlight." />
  <style>
    :root { --gold:#c9a84c; --gold-deep:#a8842f; --ink:#1f1c17; --body:#33302a; --muted:#8a857b; --line:#ece8df; --card:#ffffff; --bg:#f6f3ec; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--body); line-height:1.6; }
    .wrap { max-width:640px; margin:0 auto; padding:32px 20px 64px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:36px; box-shadow:0 8px 30px rgba(0,0,0,0.06); }
    .eyebrow { color:var(--gold-deep); font-size:12px; letter-spacing:2px; text-transform:uppercase; font-weight:700; margin:0 0 8px; }
    h1 { color:var(--ink); font-size:28px; line-height:1.2; margin:0 0 10px; font-weight:700; }
    .lead { color:var(--muted); font-size:15px; margin:0 0 28px; }
    label { display:block; font-size:14px; font-weight:600; color:var(--ink); margin:0 0 6px; }
    .req { color:var(--gold-deep); }
    .hint { font-weight:400; color:var(--muted); font-size:13px; }
    input[type=text], input[type=email], input[type=url], textarea, input[type=file] {
      width:100%; padding:12px 14px; font-size:15px; font-family:inherit; color:var(--ink);
      background:#fff; border:1px solid #ddd6c8; border-radius:10px; margin:0 0 20px; }
    input:focus, textarea:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.18); }
    textarea { resize:vertical; min-height:90px; }
    .row { display:flex; gap:16px; }
    .row > div { flex:1; }
    .hp { position:absolute; left:-9999px; opacity:0; height:0; overflow:hidden; }
    button { width:100%; background:var(--gold); color:#1f1400; border:none; padding:16px; font-size:16px; font-weight:700; border-radius:12px; cursor:pointer; transition:transform .1s ease, box-shadow .2s ease; }
    button:hover { box-shadow:0 8px 24px rgba(201,168,76,0.4); }
    button:disabled { opacity:.6; cursor:default; box-shadow:none; }
    .msg { padding:14px 16px; border-radius:10px; font-size:14px; margin:0 0 20px; display:none; }
    .msg.err { background:#fdecec; color:#a12b2b; border:1px solid #f5c6c6; display:block; }
    .msg.ok { background:#eef7ee; color:#276b2c; border:1px solid #cce6cd; display:block; }
    .success { text-align:center; padding:24px 0; }
    .success h2 { color:var(--gold-deep); }
    .footer { text-align:center; color:#a39e93; font-size:12px; margin-top:24px; }
    .footer a { color:var(--gold-deep); text-decoration:none; }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#141210; --card:#1e1b17; --body:#e8e3d8; --ink:#f4efe4; --line:#33302a; --muted:#a39e93; }
      input[type=text], input[type=email], input[type=url], textarea, input[type=file] { background:#141210; border-color:#3a352c; color:var(--ink); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="card">
      <p class="eyebrow">Miami Business Council</p>
      <h1>Member Spotlight</h1>
      <p class="lead">We'd love to feature you. Share a few details and a photo, and we'll spotlight you across the Council. Fields marked <span class="req">*</span> are required.</p>

      <div class="msg" id="msg"></div>

      <form id="form">
        <div class="row">
          <div>
            <label>First name <span class="req">*</span></label>
            <input type="text" name="first_name" required />
          </div>
          <div>
            <label>Last name</label>
            <input type="text" name="last_name" />
          </div>
        </div>

        <label>Email <span class="req">*</span></label>
        <input type="email" name="email" required />

        <label>Business name <span class="req">*</span></label>
        <input type="text" name="business_name" required />

        <label>Business website <span class="hint">— optional</span></label>
        <input type="url" name="business_website" placeholder="https://" />

        <div class="row">
          <div>
            <label>Instagram handle</label>
            <input type="text" name="instagram" placeholder="@yourhandle" />
          </div>
          <div>
            <label>LinkedIn</label>
            <input type="text" name="linkedin" placeholder="Profile URL or handle" />
          </div>
        </div>

        <label>Headshot <span class="req">*</span> <span class="hint">— a clear photo of you (JPG/PNG, max 8MB)</span></label>
        <input type="file" name="headshot" accept="image/*" required />

        <label>A quote <span class="hint">— words you live or lead by</span></label>
        <textarea name="quote" placeholder="&ldquo;...&rdquo;"></textarea>

        <label>Your biggest lesson learned in business <span class="req">*</span></label>
        <textarea name="lesson_learned" required></textarea>

        <label>Short bio <span class="hint">— a few sentences about you</span></label>
        <textarea name="bio"></textarea>

        <div class="hp"><label>Company (leave blank)</label><input type="text" name="company_hp" tabindex="-1" autocomplete="off" /></div>

        <button type="submit" id="submitBtn">Submit my spotlight</button>
      </form>

      <p class="footer">Miami Business Council &middot; <a href="https://www.miamibusinesscouncil.org">miamibusinesscouncil.org</a></p>
    </div>
  </div>

  <script>
    const FN_URL = "https://vsnvtujkkkbjpuuwxvyd.supabase.co/functions/v1/spotlight-submit";
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("submitBtn");

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.className = "msg"; msg.textContent = "";
      const fd = new FormData(form);
      const payload = Object.fromEntries(fd.entries());
      const file = fd.get("headshot");
      delete payload.headshot;

      if (file && file.size) {
        if (file.size > 8 * 1024 * 1024) { showErr("That headshot is over 8MB — please pick a smaller image."); return; }
        try { payload.headshot = await fileToDataURL(file); } catch (_) {}
      }

      btn.disabled = true; btn.textContent = "Submitting…";
      try {
        const res = await fetch(FN_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          document.getElementById("card").innerHTML =
            '<div class="success"><p class="eyebrow">Miami Business Council</p><h2>Thank you! &#127881;</h2><p class="lead">Your spotlight has been submitted. We’ll be in touch when it’s scheduled to feature.</p></div>';
        } else {
          showErr(data.error || "Something went wrong. Please try again.");
          btn.disabled = false; btn.textContent = "Submit my spotlight";
        }
      } catch (_) {
        showErr("Network error — please check your connection and try again.");
        btn.disabled = false; btn.textContent = "Submit my spotlight";
      }
    });

    function showErr(t) { msg.className = "msg err"; msg.textContent = t; window.scrollTo({ top: 0, behavior: "smooth" }); }
  </script>
</body>
</html>
